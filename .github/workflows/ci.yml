name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r PY/requirements.txt
        pip install flake8 pytest pytest-qt
      working-directory: .

    - name: Lint with flake8
      run: |
        flake8 PY/core/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 PY/ui/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 PY/tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      working-directory: .
      continue-on-error: true

    - name: Run unit tests
      run: |
        python -m pytest PY/tests/ -v --tb=short --timeout=30
      working-directory: .
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Run workflow replay tests
      run: |
        python -m pytest PY/tests/workflow_replay/ -v --tb=short --timeout=30
      working-directory: .
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Run stability tests
      run: |
        python -m pytest PY/tests/stability/ -v --tb=short --timeout=60
      working-directory: .
      env:
        QT_QPA_PLATFORM: offscreen

  build:
    runs-on: windows-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r PY/requirements.txt
      working-directory: .

    - name: Build with PyInstaller
      run: |
        cd PY
        pyinstaller app.spec --noconfirm
      working-directory: .

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build-${{ matrix.python-version }}
        path: PY/dist/
        retention-days: 7
